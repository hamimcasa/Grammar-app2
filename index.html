<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz des Temps Français | DuoStyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #1cb0f6;
            --secondary-dark: #1899d6;
            --danger: #ff4b4b;
            --danger-dark: #ea2b2b;
            --background: #f7f7f7;
            --surface: #ffffff;
            --text-main: #4b4b4b;
            --text-muted: #afafaf;
            --border: #e5e5e5;
            --border-bottom: #d5d5d5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--surface);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border);
            margin: 15px;
        }

        .header {
            padding: 20px 20px 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid var(--border);
        }

        .progress-bar-container {
            flex-grow: 1;
            height: 16px;
            background-color: var(--border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            border-radius: 8px;
            transition: width 0.4s ease;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 800;
        }

        .quiz-body {
            padding: 25px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .tense-badge {
            align-self: flex-start;
            background-color: #ddf4ff;
            color: var(--secondary-dark);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .question-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 5px;
            color: #3c3c3c;
        }

        .question-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .example-box {
            background-color: #fff9e6;
            border: 2px solid #ffcc00;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 15px;
            direction: ltr;
            text-align: left;
        }

        .example-box strong {
            color: #b38600;
            display: block;
            font-size: 12px;
            margin-bottom: 2px;
            direction: rtl;
            text-align: right;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: var(--surface);
            border: 2px solid var(--border);
            border-bottom: 4px solid var(--border-bottom);
            border-radius: 16px;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
            cursor: pointer;
            transition: all 0.1s ease;
            direction: ltr;
        }

        .option-btn:hover {
            background-color: #f7f7f7;
        }

        .option-btn.selected {
            background-color: #ddf4ff;
            border-color: var(--secondary);
            border-bottom-color: var(--secondary-dark);
            color: var(--secondary-dark);
        }

        .option-btn.correct {
            background-color: #d7ffb8 !important;
            border-color: var(--primary) !important;
            border-bottom-color: var(--primary-dark) !important;
            color: var(--primary-dark) !important;
        }

        .option-btn.incorrect {
            background-color: #ffdfe0 !important;
            border-color: var(--danger) !important;
            border-bottom-color: var(--danger-dark) !important;
            color: var(--danger-dark) !important;
        }

        .footer-feedback {
            padding: 20px;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--surface);
            transition: background-color 0.3s;
        }

        .footer-feedback.correct-bg {
            background-color: #d7ffb8;
            border-color: #b8f296;
        }

        .footer-feedback.incorrect-bg {
            background-color: #ffdfe0;
            border-color: #ffb8b8;
        }

        .feedback-message {
            font-weight: 800;
            font-size: 18px;
        }

        .footer-feedback.correct-bg .feedback-message {
            color: var(--primary-dark);
        }

        .footer-feedback.incorrect-bg .feedback-message {
            color: var(--danger-dark);
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-bottom: 4px solid var(--primary-dark);
            border-radius: 14px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: filter 0.1s;
        }

        .action-btn:hover {
            filter: brightness(1.05);
        }

        .action-btn:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        .action-btn.incorrect-btn {
            background-color: var(--danger);
            border-bottom-color: var(--danger-dark);
        }

        .results-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            flex-grow: 1;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header" id="quiz-header">
            <button class="close-btn" onclick="restartQuiz()">✕</button>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="quiz-body" id="quiz-screen">
            <div class="tense-badge" id="tense-badge">Présent de l'indicatif</div>
            <div class="question-title">اختر التصريف الصحيح للجملة:</div>
            <div class="question-subtitle" id="question-prompt"></div>

            <div class="example-box" id="example-box">
                <strong>مثال توضيحي على الزمن:</strong>
                <span id="example-text"></span>
            </div>

            <div class="options-grid" id="options-grid"></div>
        </div>

        <div class="footer-feedback hidden" id="footer-feedback">
            <div class="feedback-message" id="feedback-message"></div>
            <button class="action-btn" id="next-btn" onclick="handleNextButton()">تحقق</button>
        </div>

        <div class="results-screen" id="results-screen">
            <div style="font-size: 60px; margin-bottom: 20px;">🏆</div>
            <div style="font-size: 24px; font-weight: 800; margin-bottom: 10px;">انتهى الاختبار بنجاح!</div>
            <div style="font-size: 16px; color: var(--text-muted); margin-bottom: 20px;" id="final-score-text"></div>
            <button class="action-btn" onclick="restartQuiz()">إعادة الاختبار</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                tense: "Présent de l'indicatif",
                exampleFr: "Je parle français couramment chaque matin.",
                prompt: "أتمم الجملة في زمن المضارع:",
                sentence: "Nous [...] (aimer) voyager en Europe.",
                options: ["aimons", "aimez", "aiment"],
                answer: "aimons"
            },
            {
                tense: "Passé Composé",
                exampleFr: "Hier, j'ai visité un musée magnifique à Paris.",
                prompt: "اختر التصريف الصحيح في الماضي المركب:",
                sentence: "Elle [...] (venir) avec nous hier soir.",
                options: ["est venue", "a venu", "est venu"],
                answer: "est venue"
            },
            {
                tense: "Imparfait",
                exampleFr: "Quand j'étais enfant, je jouais au football.",
                prompt: "حدد التصريف المناسب في الماضي المستمر:",
                sentence: "Tu [...] (avoir) une belle voiture rouge autrefois.",
                options: ["avais", "avais eu", "aviez"],
                answer: "avais"
            },
            {
                tense: "Futur Simple",
                exampleFr: "Demain, nous voyagerons vers une nouvelle destination.",
                prompt: "اختر التصريف الصحيح في المستقبل البسيط:",
                sentence: "Ils [...] (faire) leurs devoirs ce soir.",
                options: ["feront", "faires", "font"],
                answer: "feront"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;
        let isAnswerSubmitted = false;

        // نظام توليد الأصوات (نجاح / خطأ) بدون الحاجة لملفات خارجية
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                // صوت نجاح (نغمة صاعدة مبهجة)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else {
                // صوت خطأ (نغمة منخفضة تحذيرية)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.setValueAtTime(120, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function loadQuestion() {
            isAnswerSubmitted = false;
            selectedOption = null;
            document.getElementById('footer-feedback').classList.add('hidden');
            document.getElementById('footer-feedback').classList.remove('correct-bg', 'incorrect-bg');
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = "تحقق";
            nextBtn.className = "action-btn";

            const q = quizData[currentQuestionIndex];
            const progressPercent = (currentQuestionIndex / quizData.length) * 100;
            document.getElementById('progress-fill').style.width = `${progressPercent}%`;

            document.getElementById('tense-badge').textContent = q.tense;
            document.getElementById('question-prompt').innerHTML = `${q.prompt}<br><strong style="font-size: 20px; color: #2b2b2b; display: block; margin-top: 10px; direction: ltr; text-align: left;">${q.sentence}</strong>`;
            document.getElementById('example-text').textContent = q.exampleFr;

            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';

            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => {
                    if (isAnswerSubmitted) return;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOption = option;
                };
                optionsGrid.appendChild(btn);
            });
        }

        function handleNextButton() {
            if (!selectedOption && !isAnswerSubmitted) {
                alert('الرجاء اختيار إجابة أولاً!');
                return;
            }

            if (!isAnswerSubmitted) {
                isAnswerSubmitted = true;
                const currentQ = quizData[currentQuestionIndex];
                const buttons = document.querySelectorAll('.option-btn');
                let isCorrect = (selectedOption === currentQ.answer);

                // تلوين الأزرار وتفعيل الصوت المناسب
                buttons.forEach(btn => {
                    if (btn.textContent === currentQ.answer) {
                        btn.classList.add('correct');
                    } else if (btn.textContent === selectedOption && !isCorrect) {
                        btn.classList.add('incorrect');
                    }
                });

                const footerFeedback = document.getElementById('footer-feedback');
                const feedbackMessage = document.getElementById('feedback-message');
                const nextBtn = document.getElementById('next-btn');

                if (isCorrect) {
                    score++;
                    playSound('correct'); // تشغيل صوت النجاح
                    footerFeedback.className = 'footer-feedback correct-bg';
                    feedbackMessage.textContent = 'إجابة صحيحة! 🎉';
                    nextBtn.className = "action-btn";
                } else {
                    playSound('error'); // تشغيل صوت الخطأ
                    footerFeedback.className = 'footer-feedback incorrect-bg';
                    feedbackMessage.textContent = `إجابة خاطئة! الصواب: ${currentQ.answer}`;
                    nextBtn.className = "action-btn incorrect-btn";
                }

                footerFeedback.classList.remove('hidden');
                nextBtn.textContent = "متابعة";
            } else {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    document.getElementById('quiz-header').style.display = 'none';
                    document.getElementById('quiz-screen').style.display = 'none';
                    document.getElementById('footer-feedback').style.display = 'none';
                    document.getElementById('results-screen').style.display = 'flex';
                    document.getElementById('final-score-text').textContent = `لقد أجبت على ${score} من ${quizData.length} إجابة صحيحة بشكل ممتاز!`;
                }
            }
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('quiz-header').style.display = 'flex';
            document.getElementById('quiz-screen').style.display = 'flex';
            document.getElementById('footer-feedback').style.display = 'flex';
            document.getElementById('results-screen').style.display = 'none';
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
